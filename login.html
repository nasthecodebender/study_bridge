<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBridge: Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">StudyBridge</a>
        
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="books.html">Books</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact Us</a>
                <a href="login.html" class="active">Login</a>
                <a href="signup.html" class="btn-signup">Signup</a>
            </div>
        </nav>
    </header>

    <main class="login-main">
        <div class="login-card">
            <h1>Welcome Back!</h1>
            <p class="subtitle">Get back to where you left!</p>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">Username / Email</label>
                    <input type="text" id="username" placeholder="Enter username or email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <p id="errorMessage" class="error-message" aria-live="polite"></p>

                <button type="submit" class="login-btn">Login</button>

                <p class="signup-link">
                    <a href="signup.html">Don't have an account? Sign up</a>
                </p>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 StudyBridge. Built with passion by high schoolers for students.</p>
        </div>
    </footer>

    <script src="login.js"></script>
</body>
</html>
