!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBridge: Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">StudyBridge</a>
            
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="books.html">Books</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact Us</a>
                <a href="login.html">Login</a>
                <a href="signup.html" class="btn-signup active">Signup</a>
            </div>
        </nav>
    </header>

    <main class="signup-main">
        <div class="signup-card">
            <h1>Join StudyBridge</h1>
            <p class="subtitle">Use studying materials freely!</p>

            <form id="signupForm" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                </div>

                <p id="statusMessage" class="status-message" aria-live="polite"></p>

                <button type="submit" class="signup-bt">Sign Up</button>

                <p class="login-link">
                    <a href="login.html">Already have an account? Login</a>
                </p>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 StudyBridge. Built with passion by high schoolers for students.</p>
        </div>
    </footer>

    <script src="signup.js"></script>
</body>
</html>
