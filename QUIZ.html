<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Study Bridge - English Quizzes (Grades 9-12)</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Study Bridge - English Quiz</h1>
            <p>Test your English skills! Choose your grade level and start the quiz.</p>
        </div>

        <div class="grade-selector">
            <h3 style="text-align: center; margin-bottom: 10px;">Select Your Grade</h3>
            <div class="grade-buttons">
                <button class="grade-btn" data-grade="9">Grade 9</button>
                <button class="grade-btn" data-grade="10">Grade 10</button>
                <button class="grade-btn" data-grade="11">Grade 11</button>
                <button class="grade-btn" data-grade="12">Grade 12</button>
            </div>
        </div>

        <div id="quizContainer" class="quiz-card">
            <div class="score-display" id="scoreDisplay">Score: 0 / 0</div>
            <div class="progress">
                <div class="question-counter" id="questionCounter">Question 1 of 50</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="question-text" id="questionText">Loading...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedback"></div>
            <button class="next-btn" id="nextBtn">Next Question</button>
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
